services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./examples:/app/examples
      - ./outputs:/app/outputs

  cli:
    build: .
    env_file: .env
    stdin_open: true
    tty: true
    volumes:
      - ./examples:/app/examples
      - ./outputs:/app/outputs
    entrypoint: ["python", "main.py"]
    profiles: ["cli"]
